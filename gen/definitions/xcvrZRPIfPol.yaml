documentation:
  sub_category: Access Policies
  ui_locations:
  - Fabric -> Access Policies -> Policies -> Interface -> Transceiver
include_parents:
- polUni
properties:
  adminSt:
    attribute_name: admin_state
    test_config:
      create:
      - config_value: enabled
  cdMax:
    attribute_name: maximum_chromatic_dispersion
    documentation:
      description: The maximum chromatic dispersion of the %s object. The difference
        with 'minimum_chromatic_dispersion' must be greater than 1000. The value must
        be in the range -50999 - 52000 when 'fec_mode' is 'oFEC' else the value must
        be in range -1399 - 2400.
    test_config:
      create:
      - config_value: "-50989"
  cdMin:
    attribute_name: minimum_chromatic_dispersion
    documentation:
      description: The minimum chromatic dispersion of the %s object. The difference
        with 'maximum_chromatic_dispersion' must be greater than 1000. The value must
        be in the range -52000 - 50999 when 'fec_mode' is 'oFEC' else the value must
        be in range -2400 - 1399.
    test_config:
      create:
      - config_value: "-51999"
  dacRate:
    documentation:
      description: The Digital-to-Analog Converter (DAC) rate of the %s object.
    test_config:
      create:
      - config_value: 1x1.25
  dwdmCarrier:
    attribute_name: dwdm_carrier_grid
    documentation:
      description: The Dense Wavelength Division Multiplexing (DWDM) carrier grid
        selector of the %s object.
    test_config:
      create:
      - config_value: 50GHzITUchannel
  fecMode:
    documentation:
      description: The Forward Error Correction (FEC) mode of the %s object. The value
        'cFEC' must have a DAC rate of '1x1', and the value 'oFEC' must have a DAC
        rate of '1x1.25'.
    test_config:
      create:
      - config_value: oFEC
  frequency50GHz:
    attribute_name: frequency_50_ghz
    documentation:
      description: The 50 gigahertz (GHz) frequency of the %s object. The value must
        be in the range 19115 - 19610.
    test_config:
      create:
      - config_value: "19369"
  frequency100MHz:
    attribute_name: frequency_100_mhz
    default_values:
      "1911500": ""
    documentation:
      description: The 100 megahertz (MHz) frequency of the %s object. The value must
        be in the range 1911500 - 1961375.
    test_config:
      create:
      - config_value: "1923504"
  ituChannel50GHz:
    attribute_name: itu_channel_50_ghz
    documentation:
      description: The 50 gigahertz (GHz) International Telecommunication Union (ITU)
        channel of the %s object. The value must be in the range 1 - 100.
    test_config:
      create:
      - config_value: "64"
  modulation:
    documentation:
      description: The modulation of the %s object.
  muxponder:
    attribute_name: muxponder_mode
    documentation:
      description: The muxponder mode of the %s object.
  transmitPower:
    documentation:
      description: The transmit power of the %s object. The value must be in the range
        -190 - 50.
    test_config:
      create:
      - config_value: "-120"
  wavelength50GHz:
    attribute_name: wavelength_50_ghz
    default_values:
      "1528773": ""
    documentation:
      description: The 50 gigahertz (GHz) wavelength of the %s object. The value must
        be in the range 1528773 - 1568362.
    test_config:
      create:
      - config_value: "1545733"
resource_name: zrp_transceiver_interface_policy
rn_prepend: infra
