    src: "The source ip of the %s object."
    grp: "The group ip of the %s object."
    rp: "The rendezvous point ip of the %s object."
    action: "The route action of the %s object."
  test_values:
    default:
      group_ip: "0.0.0.0"
      rendezvous_point_ip: "0.0.0.0"
      source_ip: "0.0.0.0"
