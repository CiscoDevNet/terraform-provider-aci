tagTag:
  documentation:
    key: "The key used to uniquely identify this configuration object."
  resource_required:
    - "value"
  test_values:
    default:
      value: "test_value"
  parents:
    - class_name: "fvAEPg"
      parent_dependency: ""
      parent_dn: "aci_application_epg.test.id"
      class_in_parent: false
    - class_name: "fvTenant"
      parent_dependency: ""
      parent_dn: "aci_tenant.test.id"
      class_in_parent: false

