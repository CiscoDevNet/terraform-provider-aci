documentation:
  sub_category: Access Policies
  ui_locations:
  - Fabric -> Access Policies -> Policies -> Interface -> L2 Interface
include_parents:
- polUni
migration_source: from_sdkv2
properties:
  qinq:
    attribute_name: q_in_q
    documentation:
      description: The QinQ port type of the %s object.
  vepa:
    attribute_name: reflective_relay
    documentation:
      description: The reflective relay (802.1Qbg) state of the %s object.
    test_config:
      create:
      - config_value: enabled
  vlanScope:
    documentation:
      description: The vlan scope of the %s object.
    test_config:
      create:
      - config_value: portlocal
resource_name: l2_interface_policy
rn_prepend: infra
state_upgrades:
- attributes:
    qinq:
      legacy_attribute: qinq
    vepa:
      legacy_attribute: vepa
  prior_schema_version: 1
