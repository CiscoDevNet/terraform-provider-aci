documentation:
  sub_category: Access Policies
  ui_locations:
  - Fabric -> Access Policies -> Policies -> Interface -> Slow Drain
include_parents:
- polUni
properties:
  congClearAction:
    attribute_name: congestion_clear_action
    documentation:
      description: The congestion clear action of the %s object.
  congDetectMult:
    attribute_name: congestion_detect_multiplier
    documentation:
      description: The congestion detect multiplier of the %s object. The value must
        be in the range 1 - 10000.
    test_config:
      create:
      - config_value: "15"
  flushAdminSt:
    attribute_name: flush_admin_state
    default_values:
      disabled: ""
    documentation:
      description: The flush administrative state of the %s object.
  flushIntvl:
    attribute_name: flush_timeout
    documentation:
      description: The flush timeout (milliseconds) of the %s object. The value must
        be in the range 100 - 1000.
    test_config:
      create:
      - config_value: "300"
resource_name: slow_drain_interface_policy
rn_prepend: infra
