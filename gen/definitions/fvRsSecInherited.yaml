documentation:
  dn_formats:
  - uni/tn-{name}/ap-{name}/epg-{name}/rssecInherited-[{tDn}]
  - uni/tn-{name}/ap-{name}/esg-{name}/rssecInherited-[{tDn}]
  - uni/tn-{name}/out-{name}/instP-{name}/rssecInherited-[{tDn}]
  - uni/tn-{name}/l2out-{name}/instP-{name}/rssecInherited-[{tDn}]
  - Too many DN formats to display, see model documentation for all possible parents
    of [fvRsSecInherited](https://pubhub.devnetcloud.com/media/model-doc-latest/docs/app/index.html#/objects/fvRsSecInherited/overview).
  example_parent_classes:
  - fvAEPg
  - fvESg
  sub_category: Application Management
  ui_locations:
  - Tenants -> Application Profiles -> Application EPGs
  - Tenants -> Application Profiles -> Endpoint Security Groups
  - Tenants -> Networking -> L3Outs -> External EPGs
  - Tenants -> Networking -> L2Outs -> External EPGs
relation_info:
  to_classes:
  - fvAEPg
  - fvESg
  - l3extInstP
resource_name: relation_to_contract_master
test_config:
  dependencies:
  - class_name: fvAEPg
    dependencies:
    - class_name: fvAp
    role: parent
  - class_name: fvESg
    dependencies:
    - class_name: fvAp
    role: parent
  - class_name: l3extInstP
    dependencies:
    - class_name: l3extOut
    role: parent
  - class_name: fvESg
    config_overrides:
      name: esg_0
    dependencies:
    - class_name: fvAp
    reference: uni/tn-test_name/ap-test_name/esg-esg_0
    reference_type: static
    role: target
  - class_name: fvESg
    config_overrides:
      name: esg_1
    dependencies:
    - class_name: fvAp
    reference: uni/tn-test_name/ap-test_name/esg-esg_1
    reference_type: static
    role: target
  - class_name: fvAEPg
    config_overrides:
      name: epg_0
    dependencies:
    - class_name: fvAp
    reference: uni/tn-test_name/ap-test_name/epg-epg_0
    reference_type: static
    role: target
  - class_name: fvAEPg
    config_overrides:
      name: epg_1
    dependencies:
    - class_name: fvAp
    reference: uni/tn-test_name/ap-test_name/epg-epg_1
    reference_type: static
    role: target
  - class_name: l3extInstP
    config_overrides:
      name: ext_epg_0
    dependencies:
    - class_name: l3extOut
    reference: uni/tn-test_name/out-test_l3_outside/instP-ext_epg_1
    reference_type: static
    role: target
  - class_name: l3extInstP
    config_overrides:
      name: ext_epg_1
    dependencies:
    - class_name: l3extOut
    reference: uni/tn-test_name/out-test_l3_outside/instP-ext_epg_0
    reference_type: static
    role: target
