documentation:
  dn_formats:
  - uni/tn-{name}/tagKey-{key}
  - uni/tn-{name}/eptags/epiptag-[{ip}]-{ctxName}/tagKey-{key}
  - uni/tn-{name}/ap-{name}/epg-{name}/tagKey-{key}
  - uni/tn-{name}/ap-{name}/tagKey-{key}
  - uni/tn-{name}/BD-{name}/tagKey-{key}
  - Too many DN formats to display, see model documentation for all possible parents
    of [tagTag](https://pubhub.devnetcloud.com/media/model-doc-latest/docs/app/index.html#/objects/tagTag/overview).
  example_parent_classes:
  - fvTenant
  - fvAEPg
  resource:
    notes:
    - This resource should not be used in combination with the `tags` nested attributes
      of other resources for the same object. Doing so will result in unexpected behaviour.
  sub_category: Generic
  ui_locations:
  - Under every object as Policy Tags in the Operational tab in recent APIC versions.
migration_source: from_sdkv2
properties:
  key:
    documentation:
      description: The key used to uniquely identify this configuration object.
  value:
    default_values:
      test_value: ""
    restriction: required
state_upgrades:
- prior_schema_version: 1
test_config:
  dependencies:
  - class_name: fvAEPg
    reference: aci_application_epg.test.id
    role: parent
  - class_name: fvTenant
    reference: aci_tenant.test.id
    role: parent
