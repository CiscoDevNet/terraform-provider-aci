properties:
  accessControlAllowCredential:
    attribute_name: allow_credentials
    documentation:
      description: Determines if credentials are allowed in HTTP responses.
  accessControlAllowOrigins:
    attribute_name: allow_origins
    documentation:
      description: Determines which origins can access the resource. For example,
        inputting http://127.0.0.1:8000 would allow access from a source device with
        that IP address and port.
  adminSt:
    attribute_name: admin_state
    documentation:
      description: The administrative state of the HTTP Service.
  cliOnlyMode:
    documentation:
      description: Determines if CLI-only mode is enabled.
  descr:
    test_config:
      create:
      - config_value: description_1
  globalThrottleRate:
    documentation:
      description: The maximum amount of API calls allowed per unit time.
    test_config:
      create:
      - config_value: "10000"
  globalThrottleSt:
    attribute_name: global_throttle_state
    documentation:
      description: The throttle state for all clients without specific identifier
        in their headers.
    test_config:
      create:
      - config_value: disabled
  globalThrottleUnit:
    documentation:
      description: The unit of measurement for rate limiting.
    test_config:
      create:
      - config_value: r/s
  maxRequestStatusCount:
    test_config:
      create:
      - config_value: "0"
  name:
    test_config:
      create:
      - config_value: name_1
  nameAlias:
    test_config:
      create:
      - config_value: name_alias_1
  nodeExporter:
    documentation:
      description: The node exporter service status.
    test_config:
      create:
      - config_value: disabled
  port:
    documentation:
      description: The port used by the HTTP communication service.
    test_config:
      create:
      - config_value: "80"
  redirectSt:
    attribute_name: redirect_state
    documentation:
      description: The state of HTTP communication service.
  referer:
    test_config:
      create:
      - config_value: referer_1
  serverHeader:
    documentation:
      description: Determines if the server header is included in responses.
    test_config:
      create:
      - config_value: disabled
  throttleRate:
    attribute_name: login_throttle_rate
    test_config:
      create:
      - config_value: "2"
  throttleSt:
    attribute_name: login_throttle_state
    documentation:
      description: The state of login and refresh throttling.
    test_config:
      create:
      - config_value: disabled
  visoreAccess:
    documentation:
      description: Grants permissions for accessing the Visore tool, also known as
        Object Store Browser, in Cisco ACI.
