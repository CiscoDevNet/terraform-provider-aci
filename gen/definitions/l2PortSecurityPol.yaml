documentation:
  dn_formats:
  - uni/infra/portsecurityP-{name}
  sub_category: Access Policies
  ui_locations:
  - Fabric -> Access Policies -> Policies -> Interface -> Port Security
include_parents:
- polUni
properties:
  maximum:
    attribute_name: maximum_endpoints
    documentation:
      description: The maximum endpoints for the %s object. The value must be in the
        range 0 - 12000.
    test_config:
      create:
      - config_value: "10101"
  timeout:
    documentation:
      description: The timeout of the %s object. The value must be in the range 60
        - 3600.
    test_config:
      create:
      - config_value: "3200"
  violation:
    attribute_name: violation_action
    documentation:
      description: The violation action of the %s object.
resource_name: port_security_interface_policy
rn_prepend: infra
