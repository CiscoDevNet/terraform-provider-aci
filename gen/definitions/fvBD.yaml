documentation:
  sub_category: Networking
  ui_locations:
  - Tenants -> Networking -> Bridge Domains
exclude_children:
- fvSiteAssociated
include_children:
- fvRogueExceptionMac
- fvAccP
migration_source: from_sdkv2
properties:
  OptimizeWanBandwidth:
    documentation:
      description: Optimize WAN Bandwidth for the %s object.
  arpFlood:
    attribute_name: arp_flooding
    documentation:
      description: Enable ARP flooding for the %s object. If flooding is disabled,
        ARP requests for unknown endpoints will be forwarded by the leaf switch to
        the spine proxy for resolution and might trigger an ARP glean if the endpoint
        is not present in the COOP database.
  enableRogueExceptMac:
    attribute_name: enable_rogue_exception_mac
    default_values:
      "no": ""
    documentation:
      description: Enable rogue exception based on MAC wildcard for the %s object.
    test_config:
      ignore_in_test: true
  epClear:
    attribute_name: clear_remote_mac_entries
    documentation:
      description: Clear all endpoints in leaf switches for the %s object.
  epMoveDetectMode:
    add_valid_values:
    - ""
    attribute_name: endpoint_move_detection_mode
    default_values:
      "": ""
    test_config:
      create:
      - config_value: garp
    value_type: string
  hostBasedRouting:
    attribute_name: advertise_host_routes
    default_values:
      "no": ""
    documentation:
      description: Advertise host routes (/32 prefixes) out of the L3Out(s) associated
        to the %s object.
  intersiteBumTrafficAllow:
    attribute_name: enable_intersite_bum_traffic
    default_values:
      "no": ""
    documentation:
      description: Enable intersite Broadcast, Unknown-Unicast and Multicast (BUM)
        traffic between sites for the %s object.
  intersiteL2Stretch:
    documentation:
      description: Enable L2 stretch between sites for the %s object.
  ipLearning:
    default_values:
      "yes": ""
    documentation:
      description: The IP learning setting of the %s object.
  ipv6McastAllow:
    attribute_name: pim_ipv6
    default_values:
      "no": ""
    documentation:
      description: Enable IPv6 Protocol Independent Multicast (PIM) traffic for the
        %s object.
  limitIpLearnToSubnets:
    default_values:
      "yes": ""
    documentation:
      description: Limit IP address learning to subnets for the %s object. Every Bridge
        Domain object can have multiple subnets associated with it
    test_config:
      create:
      - config_value: "yes"
  llAddr:
    attribute_name: link_local_ipv6_address
    default_values:
      '::': ""
    test_config:
      create:
      - config_value: fe80::1
      update:
      - config_value: fe80::0002
  mac:
    attribute_name: custom_mac_address
    default_values:
      00:22:BD:F8:19:FF: ""
    test_config:
      create:
      - config_value: 00:22:BD:F8:19:FE
  mcastARPDrop:
    attribute_name: drop_arp_with_multicast_smac
    default_values:
      "yes": ""
    documentation:
      description: Drop rogue multicast ARP packets for the %s object.
  mcastAllow:
    attribute_name: pim
    default_values:
      "no": ""
    documentation:
      description: Enable IPv4 Protocol Independent Multicast (PIM) traffic for the
        %s object.
  multiDstPktAct:
    attribute_name: multi_destination_flooding
  pcTag:
    remove_valid_values:
    - any
    restriction: read_only
  scope:
    documentation:
      description: The scope ID (L3-VNI) of the %s object.
    restriction: read_only
  seg:
    restriction: read_only
  type:
    attribute_name: bridge_domain_type
    documentation:
      description: The domain type of the %s object.
  unicastRoute:
    attribute_name: unicast_routing
    documentation:
      description: Enables L3 routing and endpoint IP learning for the %s object.
  unkMacUcastAct:
    attribute_name: l2_unknown_unicast_flooding
    test_config:
      create:
      - config_value: proxy
  unkMcastAct:
    attribute_name: l3_unknown_multicast_flooding
    documentation:
      description: The forwarding method for unknown layer 3 multicast destinations.
  v6unkMcastAct:
    attribute_name: ipv6_l3_unknown_multicast_flooding
    documentation:
      description: The forwarding method for unknown IPv6 multicast destinations.
  vmac:
    attribute_name: virtual_mac_address
    documentation:
      description: The virtual MAC address of the %s object. This is used when the
        the BD/SVI is extended to multiple sites using a L2 Outside.
    remove_valid_values:
    - not-applicable
    test_config:
      create:
      - config_value: 00:22:BD:F8:19:FB
resource_name: bridge_domain
state_upgrades:
- attributes:
    arpFlood:
      legacy_attribute: arp_flood
    epClear:
      legacy_attribute: ep_clear
    epMoveDetectMode:
      legacy_attribute: ep_move_detect_mode
    hostBasedRouting:
      legacy_attribute: host_based_routing
    intersiteBumTrafficAllow:
      legacy_attribute: intersite_bum_traffic_allow
    ipv6McastAllow:
      legacy_attribute: ipv6_mcast_allow
    llAddr:
      legacy_attribute: ll_addr
    mac:
      legacy_attribute: mac
    mcastAllow:
      legacy_attribute: mcast_allow
    multiDstPktAct:
      legacy_attribute: multi_dst_pkt_act
    parentDn:
      legacy_attribute: tenant_dn
    unicastRoute:
      legacy_attribute: unicast_route
    unkMacUcastAct:
      legacy_attribute: unk_mac_ucast_act
    unkMcastAct:
      legacy_attribute: unk_mcast_act
    v6unkMcastAct:
      legacy_attribute: v6unk_mcast_act
    vmac:
      legacy_attribute: vmac
  children:
    fvRsABDPolMonPol:
      attributes:
        tnMonEPGPolName:
          legacy_attribute: relation_fv_rs_abd_pol_mon_pol
    fvRsBDToFhs:
      attributes:
        tnFhsBDPolName:
          legacy_attribute: relation_fv_rs_bd_to_fhs
    fvRsBDToNdP:
      attributes:
        tnNdIfPolName:
          legacy_attribute: relation_fv_rs_bd_to_nd_p
    fvRsBDToNetflowMonitorPol:
      attributes:
        fltType:
          legacy_attribute: flt_type
        tnNetflowMonitorPolName:
          legacy_attribute: tn_netflow_monitor_pol_name
      legacy_attribute: relation_fv_rs_bd_to_netflow_monitor_pol
    fvRsBDToOut:
      attributes:
        tnL3extOutName:
          legacy_attribute: relation_fv_rs_bd_to_out
    fvRsBDToRelayP:
      attributes:
        tnDhcpRelayPName:
          legacy_attribute: relation_fv_rs_bd_to_relay_p
    fvRsBdToEpRet:
      attributes:
        tnFvEpRetPolName:
          legacy_attribute: relation_fv_rs_bd_to_ep_ret
    fvRsCtx:
      attributes:
        tnFvCtxName:
          legacy_attribute: relation_fv_rs_ctx
    fvRsIgmpsn:
      attributes:
        tnIgmpSnoopPolName:
          legacy_attribute: relation_fv_rs_igmpsn
    fvRsMldsn:
      attributes:
        tnMldSnoopPolName:
          legacy_attribute: relation_fv_rs_mldsn
  prior_schema_version: 1
