properties:
  accessControlAllowCredential:
    attribute_name: allow_credentials
    documentation:
      description: Determines if credentials are allowed in HTTPS responses.
  accessControlAllowOrigins:
    attribute_name: allow_origins
    documentation:
      description: Determines which origins can access the resource. For example,
        inputting http://127.0.0.1:8000 would allow access from a source device with
        that IP address and port.
  adminSt:
    attribute_name: admin_state
    documentation:
      description: The administrative state of the HTTPS Service.
    remove_valid_values:
    - disabled
  cliOnlyMode:
    documentation:
      description: Determines if CLI-only mode is enabled.
    test_config:
      create:
      - config_value: disabled
  clientCertAuthState:
    attribute_name: client_certificate_authentication_state
    documentation:
      description: The authentication state of the client certificate.
    test_config:
      create:
      - config_value: disabled
  descr:
    test_config:
      create:
      - config_value: description_1
  dhParam:
    attribute_name: dh_parameter
    documentation:
      description: Determines the settings for Diffie-Hellman (DH) parameters.
  globalThrottleRate:
    documentation:
      description: The maximum amount of API calls allowed per unit time.
    test_config:
      create:
      - config_value: "10000"
  globalThrottleSt:
    attribute_name: global_throttle_state
    documentation:
      description: The throttle state for all clients without specific identifier
        in their headers.
    test_config:
      create:
      - config_value: disabled
  globalThrottleUnit:
    add_valid_values:
    - r/s
    - r/m
    documentation:
      description: The unit of measurement for rate limiting specified with the 'global_throttle_rate'
        attribute.
    test_config:
      create:
      - config_value: r/s
  maxRequestStatusCount:
    test_config:
      create:
      - config_value: "0"
  name:
    test_config:
      create:
      - config_value: name_1
  nameAlias:
    test_config:
      create:
      - config_value: name_alias_1
  nodeExporter:
    documentation:
      description: The node exporter service status.
    test_config:
      create:
      - config_value: disabled
  port:
    documentation:
      description: The port used by the HTTPS communication service.
    test_config:
      create:
      - config_value: "443"
  referer:
    documentation:
      description: Allowed HTTP referers.
    test_config:
      create:
      - config_value: referer_1
  serverHeader:
    documentation:
      description: Determines if the server header is included in responses.
    test_config:
      create:
      - config_value: disabled
  sslProtocols:
    documentation:
      description: The SSL protocols allowed by HTTPS communication service.
    test_config:
      create:
      - config_value: '["TLSv1"]'
  throttleRate:
    attribute_name: login_throttle_rate
    test_config:
      create:
      - config_value: "2"
  throttleSt:
    attribute_name: login_throttle_state
    documentation:
      description: The state of login and refresh throttling.
    test_config:
      create:
      - config_value: disabled
  visoreAccess:
    documentation:
      description: Grants permissions for accessing the Visore tool, also known as
        Object Store Browser, in Cisco ACI.
    test_config:
      create:
      - config_value: disabled
